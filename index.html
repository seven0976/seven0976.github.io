<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 卦象日历</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Songti SC","Noto Serif SC",serif;background:
  radial-gradient(circle at top left,rgba(255,240,220,.18),transparent 35%),
  radial-gradient(circle at 80% 18%,rgba(157,188,156,.14),transparent 30%),
  linear-gradient(180deg,#16110d 0%,#120e0b 100%);
  min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:24px;color:#3d2a1a}
.wrap{position:relative;isolation:isolate;overflow:hidden;max-width:1200px;width:100%;
  background:linear-gradient(180deg,rgba(255,252,247,.98) 0%,rgba(248,240,230,.96) 100%);
  border-radius:40px;box-shadow:0 24px 72px rgba(0,0,0,0.52),0 0 0 1px rgba(214,196,173,.8),inset 0 1px 0 rgba(255,255,255,.72);
  padding:34px 38px 40px}
.wrap::before{content:'';position:absolute;inset:16px;border:1px solid rgba(179,159,135,0.28);border-radius:28px;pointer-events:none;z-index:0}
.wrap::after{content:'';position:absolute;inset:auto -10% -8% auto;width:340px;height:340px;background:radial-gradient(circle,rgba(47,118,88,0.08)0%,rgba(47,118,88,0)70%);pointer-events:none;z-index:0}
.hd,.lb,.dp,.gd,.cg{position:relative;z-index:1}
.hd{display:flex;align-items:center;justify-content:center;padding:0 0 20px;margin-bottom:24px}
.brand-head{position:relative;display:flex;align-items:center;justify-content:center;width:100%;min-height:clamp(72px,8vw,104px);text-align:center}
.brand-logo{position:absolute;left:0;top:50%;transform:translateY(-50%);width:clamp(76px,8vw,108px);height:clamp(76px,8vw,108px);object-fit:contain;display:block;filter:drop-shadow(0 8px 14px rgba(61,42,26,.2))}
.title-block{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;margin:0 auto}
.mt{display:flex;flex-direction:column;align-items:center;text-align:center;font-size:2.68rem;font-weight:900;color:#352315;letter-spacing:8px;line-height:1.26;text-shadow:0 1px 0 rgba(255,255,255,0.78),0 7px 18px rgba(80,50,30,0.12)}
.mt .yr{font-weight:400;font-size:1.1rem;color:#8a6e4e;letter-spacing:2px;margin-top:4px}
.seal{display:inline-block;background:linear-gradient(180deg,#c24837 0%,#a22e25 100%);color:#fff4e6;font-size:.85rem;font-weight:700;padding:4px 13px;border-radius:28px 5px 28px 5px;letter-spacing:2px;box-shadow:inset 0 -2px 0 #722018,0 3px 10px rgba(180,60,40,0.28);border:1px solid #d46a5a;transform:rotate(-2deg)}
.lb{overflow:hidden;background:linear-gradient(180deg,rgba(244,236,224,0.92),rgba(226,213,196,0.78));border-radius:28px;padding:11px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:22px;border:1px solid rgba(188,166,139,0.82);box-shadow:inset 0 1px 0 rgba(255,255,255,0.66),0 8px 18px rgba(80,50,30,0.07)}
.lb .ll{display:flex;align-items:center;gap:8px;color:#5a4030;font-weight:600;font-size:.95rem}
.lb .ll .dot{display:inline-block;width:10px;height:10px;background:#b53b2c;border-radius:50%;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 0 0 rgba(180,60,40,0.3)}50%{opacity:0.5;transform:scale(0.85);box-shadow:0 0 14px 4px rgba(180,60,40,0.12)}}
.li{display:flex;align-items:center;gap:20px;flex-wrap:wrap;font-size:.95rem}
.li .it{display:flex;align-items:baseline;gap:5px;color:#3d2a1a;background:rgba(255,250,244,0.42);padding:3px 9px;border-radius:18px;border:1px solid rgba(218,201,180,0.55)}
.li .it .tag{opacity:.6}
.li .it .vl{font-weight:700;color:#7a3a2a}
.li .it .vl.gn{font-size:1.2rem;color:#b53b2c;background:rgba(180,60,40,0.08);padding:0 12px;border-radius:20px;border:1px solid rgba(180,60,40,0.15)}
.dp{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px;padding:13px 18px;background:linear-gradient(180deg,rgba(239,226,209,0.78),rgba(222,202,176,0.35));border-radius:40px;border:1px solid rgba(218,201,180,0.94);box-shadow:inset 0 1px 0 rgba(255,255,255,0.58),0 8px 20px rgba(80,50,30,0.06)}
.dp label{font-weight:600;color:#5a4030;letter-spacing:2px}
.dp input[type=date]{font-family:serif;font-size:1rem;padding:8px 16px;border:1px solid #c9b79b;border-radius:30px;background:linear-gradient(180deg,#fffaf4,#f4eadf);color:#3d2a1a;outline:none;min-width:180px;box-shadow:inset 0 1px 4px rgba(80,50,30,0.06)}
.dp input[type=date]:focus{border-color:#b53b2c;box-shadow:0 0 0 3px rgba(180,60,40,0.15)}
.dp .bg{display:flex;gap:6px}
.dp .bn{font-family:serif;background:linear-gradient(180deg,#efe6da,#dccab4);border:1px solid #c9b79b;padding:6px 18px;border-radius:30px;font-size:.9rem;font-weight:600;color:#3d2a1a;cursor:pointer;transition:transform .2s,box-shadow .2s,background .2s}
.dp .bn:hover{background:linear-gradient(180deg,#f4ebe1,#d6c2a9);transform:translateY(-1px);box-shadow:0 5px 12px rgba(80,50,30,0.1)}
.dp .bn.p{background:linear-gradient(180deg,#be4434,#942a20);border-color:#8a2a1e;color:#f7efe6;box-shadow:0 5px 13px rgba(180,60,40,0.18)}
.dp .bn.p:hover{background:linear-gradient(180deg,#c85241,#81241b)}
.dp .tl{font-size:.9rem;color:#806246;margin-left:auto;background:rgba(255,250,244,0.58);padding:5px 16px;border-radius:30px;border:1px solid rgba(218,201,180,0.88);box-shadow:inset 0 1px 0 rgba(255,255,255,0.68)}
.gd{display:grid;grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));gap:28px;margin-bottom:20px}

.gc{background:linear-gradient(180deg,rgba(255,250,244,0.9),rgba(244,235,224,0.78));border-radius:24px;padding:24px 28px;border:1px solid rgba(218,201,180,0.86);box-shadow:0 9px 24px rgba(80,50,30,0.09),inset 0 1px 0 rgba(255,255,255,0.72);position:relative;overflow:hidden;transition:transform 0.3s ease,box-shadow 0.3s ease}
.gc:hover{transform:translateY(-3px);box-shadow:0 15px 34px rgba(80,50,30,0.14),inset 0 1px 0 rgba(255,255,255,0.72)}
.gc .cl{font-size:.9rem;letter-spacing:4px;color:#8e7558;margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:8px}
.gc .cl::before{content:'';width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#d26c5c,#b53b2c);box-shadow:0 0 0 4px rgba(181,59,44,0.08)}
.gc .ct{font-size:1.6rem;font-weight:700;color:#3d2a1a;margin-bottom:6px; display:flex; flex-wrap:wrap; gap:10px; line-height:1.25;}
.gc .ct .gb{font-size:2.8rem;color:#a72f24;font-weight:900;letter-spacing:4px;background:linear-gradient(180deg,rgba(180,60,40,0.09),rgba(255,250,244,0.65));padding:2px 18px;border-radius:14px;border:1px solid rgba(180,60,40,0.12);display:inline-block;margin:0;box-shadow:inset 0 1px 0 rgba(255,255,255,0.75),0 5px 12px rgba(80,50,30,0.08)}
.gc .cs{color:#8a6e4e;font-size:.9rem;margin-top:4px}
.gc .cs .di{opacity:.7}
.cg{margin-top:8px;background:linear-gradient(180deg,rgba(255,250,244,0.88),rgba(242,231,217,0.76));border-radius:24px;padding:22px;border:1px solid rgba(218,201,180,0.96);box-shadow:0 10px 26px rgba(80,50,30,0.08),inset 0 1px 0 rgba(255,255,255,0.7);overflow:hidden}
.gh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.gh .ml{font-size:1.45rem;font-weight:800;color:#352315;letter-spacing:4px;position:relative;padding-left:14px}
.gh .ml small{font-weight:400;font-size:.9rem;color:#8a6e4e}
.gh .nb{font-family:serif;background:linear-gradient(180deg,#efe6da,#dccab4);border:1px solid #c9b79b;padding:5px 16px;border-radius:30px;font-size:1rem;color:#5a4030;cursor:pointer;transition:.2s;box-shadow:inset 0 1px 0 rgba(255,255,255,0.62)}
.gh .nb:hover{background:linear-gradient(180deg,#f4ebe1,#d6c2a9);transform:translateY(-1px)}
.wr{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:7px;text-align:center;font-weight:700;color:#856a4f;font-size:.8rem}
.wr span{background:rgba(218,201,180,0.36);border:1px solid rgba(218,201,180,0.42);border-radius:10px;padding:6px 0}
.wr span:first-child,.wr span:last-child{color:#b53b2c}
.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dc{position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(250,246,240,0.72),rgba(238,225,208,0.54));border-radius:12px;padding:7px;text-align:center;cursor:pointer;border:1px solid rgba(218,201,180,0.28);min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.25s ease;box-shadow:inset 0 1px 0 rgba(255,255,255,0.48)}
.dc:hover{background:linear-gradient(180deg,#f2e7da,#e4d4be);border-color:#c9b79b;transform:translateY(-1px);box-shadow:0 6px 12px rgba(80,50,30,0.08),inset 0 1px 0 rgba(255,255,255,0.62)}
.dc.sl{background:linear-gradient(180deg,#e4d0b7,#cbb08f);border-color:#b53b2c;box-shadow:0 0 0 2px rgba(181,59,44,0.1),inset 0 1px 0 rgba(255,255,255,0.45)}
.dc.td{border-color:#b53b2c;background:linear-gradient(180deg,rgba(180,60,40,0.12),rgba(250,246,240,0.7));animation:breathe 3s ease-in-out infinite}
.dc.td::after{content:'今';position:absolute;top:4px;right:5px;font-size:.48rem;font-weight:800;color:#f7efe6;background:#b53b2c;border-radius:50%;width:16px;height:16px;line-height:16px;box-shadow:0 2px 6px rgba(180,60,40,0.25)}
.dc.om{opacity:.3}
.dc .dn{font-weight:800;font-size:1rem;color:#3d2a1a;position:relative;z-index:1}
.tb{position:relative;z-index:1;font-size:.5rem;background:linear-gradient(180deg,#b53b2c,#8d2a21);color:#f7efe6;padding:1px 7px;border-radius:8px;font-weight:700;margin-top:3px;display:inline-block;line-height:1.5;box-shadow:0 2px 5px rgba(180,60,40,0.18)}

/* 新增爻位时间表样式 */
.yt-container { display:grid; grid-template-columns:repeat(auto-fill, minmax(116px, 1fr)); gap:8px; margin-top:12px; max-height:160px; overflow-y:auto; padding-right:8px; scroll-behavior:smooth; }
.yt-container::-webkit-scrollbar { width:4px; }
.yt-container::-webkit-scrollbar-thumb { background:#dac9b4; border-radius:4px; }
.yt-item { position:relative;background:linear-gradient(180deg,rgba(239,226,209,0.66),rgba(250,246,240,0.5)); padding:8px 10px 8px 14px; border-radius:12px; border:1px solid #dac9b4; font-size:.85rem; display:flex; flex-direction:column; gap:4px; transition:all 0.3s; box-shadow:inset 0 1px 0 rgba(255,255,255,0.56); }
.yt-time { color:#b53b2c; font-weight:700; }
.yt-name { color:#3d2a1a; font-weight:600; }
.yt-active { background:linear-gradient(180deg,#b94131,#8d281f); border-color:#8a2a1e; transform:scale(1.02); box-shadow:0 4px 14px rgba(180,60,40,0.24); animation:glowActive 2s ease-in-out infinite; }
.yt-active .yt-time, .yt-active .yt-name { color:#f7efe6; }

.ft{display:flex;align-items:center;justify-content:center;gap:10px;text-align:center;padding:16px 0 8px;color:#806246;font-size:.85rem;letter-spacing:1.5px;margin-top:10px;flex-wrap:wrap}
.ft-dot{width:5px;height:5px;border-radius:50%;background:#b53b2c;box-shadow:0 0 0 4px rgba(181,59,44,0.08)}
.bagua-bg{position:absolute;inset:0;z-index:0;pointer-events:none;display:flex;align-items:center;justify-content:center;color:#332518;opacity:0.08;filter:drop-shadow(0 12px 22px rgba(80,50,30,0.12))}
/* 平板及以下 */
@media(max-width:860px) {
  body { padding:16px; }
  .wrap { padding:20px 16px; border-radius:28px; }
  .brand-head { min-height:76px; }
  .brand-logo { width:76px; height:76px; }
  .mt { font-size:2rem; letter-spacing:4px; }
  .yt-container { max-height:300px; }
  .bagua-bg svg { width:90%; height:90%; }
}

/* 手机 */
@media(max-width:540px) {
  body { overflow-x:hidden; padding:10px; }
  .wrap { overflow:hidden;padding:12px 10px; border-radius:20px; }
  .wrap::before { inset:8px; border-radius:14px; }
  .hd { padding-bottom:12px; margin-bottom:16px; }
  .brand-head { min-height:52px; }
  .brand-logo { width:52px; height:52px; }
  .mt { font-size:1.5rem; letter-spacing:2px; }
  .mt .yr { font-size:.85rem; margin-top:2px; }
  .seal { font-size:.72rem; padding:3px 10px; }
  
  .lb { padding:8px 12px; flex-direction:column; gap:4px; }
  .lb .ll { font-size:.85rem; }
  .lb .li { gap:8px; font-size:.8rem; flex-wrap:wrap; justify-content:center; }
  .li .it .vl.gn { font-size:1rem; padding:0 8px; }
  
  .dp { flex-direction:column; align-items:stretch; gap:8px; padding:10px 12px; }
  .dp label { font-size:.85rem; }
  .dp input[type=date] { min-width:unset; width:100%; font-size:.9rem; padding:6px 12px; }
  .dp .bg { justify-content:center; }
  .dp .bg .bn { font-size:.8rem; padding:5px 12px; min-height:36px; }
  .dp .bn.p { font-size:.8rem; padding:5px 16px; min-height:36px; }
  .dp .tl { font-size:.8rem; margin-left:0; text-align:center; }
  
  .gd { grid-template-columns:1fr; gap:14px; }
  .gc { padding:18px 18px; }
  .gc .ct { font-size:1.15rem; }
  .gc .ct .gb { font-size:1.3rem; padding:0 10px; }
  .gc .cs { font-size:.8rem; }
  
  .cg { padding:12px; }
  .gh { margin-bottom:10px; }
  .gh .ml { font-size:1.1rem; letter-spacing:2px; }
  .gh .nb { font-size:.85rem; padding:3px 12px; min-height:36px; }
  
  .wr { font-size:.7rem; }
  .wr span { padding:5px 0; border-radius:8px; }
  .dc { padding:2px; min-height:40px; border-radius:8px; }
  .dc.td::after { width:13px; height:13px; line-height:13px; font-size:.4rem; top:3px; right:3px; }
  .dc .dn { font-size:.8rem; }
  .tb { font-size:.4rem; padding:0 4px; line-height:1.4; }
  
  .yt-container { grid-template-columns:repeat(2,1fr); gap:5px; }
  .yt-item { padding:8px 10px; font-size:.8rem; border-radius:8px; }
  
  .bagua-bg svg { width:98%; height:98%; max-width:320px; }
  .ft { gap:7px; font-size:.78rem; padding:12px 0 6px; }
}
/* === Animations === */
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes stampIn{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.18) rotate(-1deg);opacity:1}80%{transform:scale(0.92) rotate(-3deg)}100%{transform:scale(1) rotate(-2deg);opacity:1}}
@keyframes cardSlideLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes cardSlideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes glowActive{0%,100%{box-shadow:0 4px 12px rgba(180,60,40,0.2)}50%{box-shadow:0 4px 24px rgba(180,60,40,0.45)}}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(180,60,40,0.15)}50%{box-shadow:0 0 0 8px rgba(180,60,40,0.05)}}
@keyframes yaoSlideIn{from{opacity:0;transform:translateY(12px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.wrap{animation:fadeInUp 0.8s ease-out both}
.seal{animation:stampIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both}
.lb{animation:fadeInDown 0.5s ease-out 0.15s both}
.dp{animation:fadeInUp 0.5s ease-out 0.25s both}
.gd .gc:first-child{animation:cardSlideLeft 0.6s ease-out 0.35s both}
.gd .gc:last-child{animation:cardSlideRight 0.6s ease-out 0.45s both}
.cg{animation:fadeInUp 0.6s ease-out 0.55s both}
</style>
</head>

      </g>
    </svg>
  </div>
  <div class="hd">
    <div class="brand-head">
      <img class="brand-logo" src="assets/hoyi-logo.png" alt="合一研习社" width="720" height="720">
      <div class="title-block">
        <div class="mt">卦象日历<span class="yr">2026</span></div>

</div>
  <div class="lb">
    <div class="ll"><span class="dot"></span>实时卦象</div>

  <div class="gd">
    <div class="gc">
      <div class="cl" id="cardLabel">今日卦象</div>
      <!-- 卦象容器，将会容纳当天的所有独立卦名 -->
      <div class="ct" id="sgNameCt"></div>
      <div class="cs"><span class="di" id="sgDate">—</span></div>
    </div>
    <div class="gc">
      <div class="cl">当日爻位变动表</div>
      <div id="yaoTimeline" class="yt-container"></div>

  <div class="cg">
    <div class="gh"><span class="ml" id="cml"></span><div><button class="nb" id="pm">上个月</button><button class="nb" id="nm">下个月</button></div></div>
    <div class="wr"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
    <div class="dg" id="dg"></div>
    <div class="ft"><span>© 合一研习社</span><span class="ft-dot"></span><span>公众号：合一研习社</span></div>
  </div>
</div>
<script>
var TG={乾:[1,1,1],兑:[1,1,0],离:[1,0,1],震:[1,0,0],巽:[0,1,1],坎:[0,1,0],艮:[0,0,1],坤:[0,0,0]};
var HN=['姤','大过','鼎','恒','巽','井','蛊','升','讼','困','未济','解','涣','蒙','师','遁','咸','旅','小过','渐','蹇','艮','谦','否','萃','晋','豫','观','比','剥','复','颐','屯','益','震','噬嗑','随','无妄','明夷','贲','既济','家人','丰','革','同人','临','损','节','中孚','归妹','睽','兑','履','泰','大畜','需','小畜','大壮','大有','夬'];
var YN=['初爻','二爻','三爻','四爻','五爻','上爻'];
var HM=[['巽','乾'],['巽','兑'],['巽','离'],['巽','震'],['巽','巽'],['巽','坎'],['巽','艮'],['巽','坤'],['坎','乾'],['坎','兑'],['坎','离'],['坎','震'],['坎','巽'],['坎','艮'],['坎','坤'],['艮','乾'],['艮','兑'],['艮','离'],['艮','震'],['艮','巽'],['艮','坎'],['艮','艮'],['艮','坤'],['坤','乾'],['坤','兑'],['坤','离'],['坤','震'],['坤','巽'],['坤','坎'],['坤','艮'],['震','坤'],['震','艮'],['震','坎'],['震','巽'],['震','震'],['震','离'],['震','兑'],['震','乾'],['离','坤'],['离','艮'],['离','坎'],['离','巽'],['离','震'],['离','兑'],['离','乾'],['兑','坤'],['兑','艮'],['兑','坎'],['兑','巽'],['兑','震'],['兑','离'],['兑','兑'],['兑','乾'],['乾','坤'],['乾','艮'],['乾','坎'],['乾','巽'],['乾','震'],['乾','离'],['乾','兑']];
var HL=HM.map(function(m){return TG[m[0]].concat(TG[m[1]]);});
var SUN=[1,1,0,0,0,1];
function fi(p){var k=p.join('');for(var i=0;i<HL.length;i++)if(HL[i].join('')===k)return i;return -1;}
var GSH=[0,1,2,3,4,5].map(function(l){var r=SUN.map(function(v,i){return i===l?1-v:v;});return fi(r);});

var ST=[
    {n:'冬至', d:new Date('2025-12-21T23:01:17')},
    {n:'小寒', d:new Date('2026-01-05T19:09:00')},
    {n:'大寒', d:new Date('2026-01-20T11:43:00')},
    {n:'立春', d:new Date('2026-02-04T04:02:00')},
    {n:'雨水', d:new Date('2026-02-18T23:51:46')},
    {n:'惊蛰', d:new Date('2026-03-05T21:58:51')},
    {n:'春分', d:new Date('2026-03-20T22:45:46')},
    {n:'清明', d:new Date('2026-04-05T02:39:50')},
    {n:'谷雨', d:new Date('2026-04-20T09:38:57')},
    {n:'立夏', d:new Date('2026-05-05T19:48:34')},
    {n:'小满', d:new Date('2026-05-21T08:36:37')},
    {n:'芒种', d:new Date('2026-06-05T23:48:11')},
    {n:'夏至', d:new Date('2026-06-21T16:24:22')},
    {n:'小暑', d:new Date('2026-07-07T09:56:47')},
    {n:'大暑', d:new Date('2026-07-23T03:12:57')},
    {n:'立秋', d:new Date('2026-08-07T19:42:32')},
    {n:'处暑', d:new Date('2026-08-23T10:18:38')},
    {n:'白露', d:new Date('2026-09-07T22:41:07')},
    {n:'秋分', d:new Date('2026-09-23T08:05:05')},
    {n:'寒露', d:new Date('2026-10-08T14:29:09')},
    {n:'霜降', d:new Date('2026-10-23T17:37:44')},
    {n:'立冬', d:new Date('2026-11-07T17:51:51')},
    {n:'小雪', d:new Date('2026-11-22T15:23:05')},
    {n:'大雪', d:new Date('2026-12-07T10:52:20')},
    {n:'冬至', d:new Date('2026-12-22T04:50:03')},
    {n:'小寒', d:new Date('2027-01-05T22:09:50')},
    {n:'大寒', d:new Date('2027-01-20T15:29:41')},
    {n:'立春', d:new Date('2027-02-04T09:46:00')}
];

var GN=[['冬至','小寒','大寒','立春'],['雨水','惊蛰','春分','清明'],['谷雨','立夏','小满','芒种'],['夏至','小暑','大暑','立秋'],['处暑','白露','秋分','寒露'],['霜降','立冬','小雪','大雪']];
function tI(d){var ts=d.getTime();for(var i=ST.length-1;i>=0;i--)if(ts>=ST[i].d.getTime())return i;return 0;}
function cG(i,p){var n=ST[i].n,g=-1;for(var j=0;j<GN.length;j++){if(GN[j].indexOf(n)>=0){g=j;break;}}if(g<0)g=Math.min(5,Math.floor(i/4));var s=GSH[g],tg=GN[g].indexOf(n),o=(s+tg*15)%60,ty=Math.floor(p*90);return{hi:(o+Math.floor(ty/6))%60,yn:ty%6,yname:YN[ty%6],tn:n,ys:HL[(o+Math.floor(ty/6))%60][ty%6]};}
function gG(d){var ts=d.getTime(),i=tI(d);if(i>=ST.length-1){i=ST.length-2;return cG(i,1);}var s=ST[i].d.getTime(),e=ST[i+1].d.getTime();if(e<=s)return cG(i,0);return cG(i,Math.min(1,Math.max(0,(ts-s)/(e-s))));}
function fD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fDC(d){return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';}
function fT(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');}

var app={selDate:new Date(),vy:2026,vm:0};

// 【新增核心功能】：获取指定日期（0点~24点）内发生过的全部独立卦象数组
function getDayHexagrams(d) {
    var dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0).getTime();
    var dayEnd = dayStart + 24 * 60 * 60 * 1000;
    var hexList = [];
    
    for (var i = 0; i < ST.length - 1; i++) {
        var sTime = ST[i].d.getTime();
        var eTime = ST[i+1].d.getTime();
        
        if (eTime > dayStart && sTime < dayEnd) {
            var duration = eTime - sTime;
            var yaoDuration = duration / 90; 
            
            for (var j = 0; j < 90; j++) {
                var yStart = sTime + j * yaoDuration;
                var yEnd = sTime + (j + 1) * yaoDuration;
                
                if (yEnd > dayStart && yStart < dayEnd) {
                    var gu = cG(i, j / 90);
                    if(gu.hi >= 0) {
                        var hx = HN[gu.hi] + '卦';
                        if(hexList.indexOf(hx) === -1) {
                            hexList.push(hx);
                        }
                    }
                }
            }
        }
    }
    return hexList.length > 0 ? hexList : ['—'];
}

function uYT(d) {
    var container = document.getElementById('yaoTimeline');
    var dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0).getTime();
    var dayEnd = dayStart + 24 * 60 * 60 * 1000;
    var now = new Date().getTime();
    var h = '';
    
    for (var i = 0; i < ST.length - 1; i++) {
        var sTime = ST[i].d.getTime();
        var eTime = ST[i+1].d.getTime();
        
        if (eTime > dayStart && sTime < dayEnd) {
            var duration = eTime - sTime;
            var yaoDuration = duration / 90; 
            
            var animIdx = 0;
            for (var j = 0; j < 90; j++) {
                var yStart = sTime + j * yaoDuration;
                var yEnd = sTime + (j + 1) * yaoDuration;
                
                if (yEnd > dayStart && yStart < dayEnd) {
                    var gu = cG(i, j / 90);
                    var ysDate = new Date(yStart);
                    
                    var timeStr = (ysDate.getTime() < dayStart ? '昨日 ' : '') + 
                                  String(ysDate.getHours()).padStart(2,'0') + ':' + 
                                  String(ysDate.getMinutes()).padStart(2,'0');
                    
                    var cls = 'yt-item';
                    if (now >= yStart && now < yEnd) cls += ' yt-active';
                    
                    h += '<div class="' + cls + '" style="animation:yaoSlideIn 0.35s ease-out ' + (animIdx * 0.04).toFixed(2) + 's both"><span class="yt-time">' + timeStr + ' 起</span><span class="yt-name">' + HN[gu.hi] + '卦 · ' + gu.yname + '</span></div>';
                    animIdx++;
                }
            }
        }
    }
    container.innerHTML = h || '<div style="color:#8a6e4e;font-size:0.9rem;padding:8px;">本日无卦象数据（超出范围）</div>';
}

function uL(){
    var n=new Date(),gu=gG(n);
    
    // 1. 更新顶部小字横幅（永远跟随真实时间）
    document.getElementById('lt').textContent=fT(n);
    document.getElementById('lg').textContent=gu.hi>=0?HN[gu.hi]+'卦':'—';
    document.getElementById('ly').textContent=gu.yname;
    
    // 2. 更新下方大卡片内容
    if(app.selDate && fD(app.selDate)===fD(n)) {
        // 由于大卡片现在已经通过 uS 铺好了今日所有的全天大字卦象，我们只需要让大卡片的时间继续走秒即可
        document.getElementById('sgDate').textContent=fDC(n)+' '+fT(n);
        
        // 每逢整分钟刷新一次下方时间列表，以更新高亮状态
        if(n.getSeconds() === 0) uYT(app.selDate);
    }
}

function uS(d){
    var n=new Date(), isT=fD(d)===fD(n);
    var targetTime = new Date(d);
    targetTime.setHours(0,0,0,0); // 用于获取“整天”数据的基准时间
    
    // 【更新卡片卦名】：获取当天所有的卦名并渲染出来
    var hexArr = getDayHexagrams(targetTime);
    var html = '';
    for(var k=0; k<hexArr.length; k++){
        html += '<span class="gb">' + hexArr[k] + '</span>';
    }
    document.getElementById('sgNameCt').innerHTML = html;
    
    document.getElementById('cardLabel').textContent=isT?'今日卦象':'卦象 '+fDC(targetTime);
    document.getElementById('sgDate').textContent=isT?fDC(n)+' '+fT(n):fDC(targetTime);
    document.getElementById('tll').textContent=fDC(targetTime);
    document.getElementById('dp').value=fD(targetTime);
    
    app.selDate=targetTime;
    uYT(targetTime);
}

function rC(y,m){var fd=new Date(y,m,1),ld=new Date(y,m+1,0),dim=ld.getDate(),sw=fd.getDay();var mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];document.getElementById('cml').innerHTML=mn[m]+' '+y;var pmd=new Date(y,m,0).getDate(),tc=Math.ceil((sw+dim)/7)*7;var td=new Date(),tds=fD(td),h='';for(var i=0;i<tc;i++){var dn,om=false,cd;if(i<sw){dn=pmd-sw+i+1;om=true;cd=new Date(y,m-1,dn);}else if(i>=sw+dim){dn=i-sw-dim+1;om=true;cd=new Date(y,m+1,dn);}else{dn=i-sw+1;cd=new Date(y,m,dn);}var ds=fD(cd),it=ds===tds,is=ds===fD(app.selDate);var tn='',ist=false;if(!om){for(var ti=0;ti<ST.length;ti++){var t2=ST[ti].d;if(t2.getFullYear()===y&&t2.getMonth()===m&&t2.getDate()===dn){tn=ST[ti].n;ist=true;break;}}}var cls='dc';if(om)cls+=' om';if(it)cls+=' td';if(is)cls+=' sl';var tb='';if(ist&&!om)tb='<span class="tb">'+tn+'</span>';h+='<div class="'+cls+'" data-d="'+ds+'"><div class="dn">'+dn+'</div>'+tb+'</div>';}document.getElementById('dg').innerHTML=h;document.querySelectorAll('.dc[data-d]').forEach(function(el){el.addEventListener('click',function(){var ds2=this.dataset.d;if(!ds2)return;var p=ds2.split('-'),d2=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));app.selDate=d2;app.vy=d2.getFullYear();app.vm=d2.getMonth();uS(d2);rC(app.vy,app.vm);});});}

function cM(d){app.vm+=d;if(app.vm<0){app.vm=11;app.vy--;}else if(app.vm>11){app.vm=0;app.vy++;}rC(app.vy,app.vm);}

function init(){
    var n=new Date();
    app.selDate=n;
    app.vy=n.getFullYear();
    app.vm=n.getMonth();
    uS(n);
    uL();
    rC(app.vy,app.vm);
    setInterval(uL,1000);
    
    document.getElementById('dp').addEventListener('change',function(){var v=this.value;if(!v)return;var p=v.split('-'),d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));app.selDate=d;app.vy=d.getFullYear();app.vm=d.getMonth();uS(d);rC(app.vy,app.vm);});
    document.getElementById('bpd').addEventListener('click',function(){var d=new Date(app.selDate);d.setDate(d.getDate()-1);app.selDate=d;app.vy=d.getFullYear();app.vm=d.getMonth();uS(d);rC(app.vy,app.vm);});
    document.getElementById('bnd').addEventListener('click',function(){var d=new Date(app.selDate);d.setDate(d.getDate()+1);app.selDate=d;app.vy=d.getFullYear();app.vm=d.getMonth();uS(d);rC(app.vy,app.vm);});
    document.getElementById('btnToday').addEventListener('click',function(){var n=new Date(),d=new Date(n.getFullYear(),n.getMonth(),n.getDate());app.selDate=d;app.vy=d.getFullYear();app.vm=d.getMonth();uS(d);rC(app.vy,app.vm);});
    document.getElementById('pm').addEventListener('click',function(){cM(-1);});
    document.getElementById('nm').addEventListener('click',function(){cM(1);});
    document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')cM(-1);else if(e.key==='ArrowRight')cM(1);});
}
document.addEventListener('DOMContentLoaded',init);
</script>
